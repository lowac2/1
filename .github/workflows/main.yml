name: Chorcha Quiz Bot Automation

on:
  schedule:
    # Run twice a day. Adjust hours (in UTC) as desired.
    # Below runs at 00:00 and 12:00 UTC (which is 6:00 AM and 6:00 PM Bangladesh Standard Time).
    - cron: '0 2,8,11 * * *'
  workflow_dispatch:
    # Allows you to trigger this workflow manually from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Create auth.json from Secret
      env:
        AUTH_JSON_SECRET: ${{ secrets.CHORCHA_AUTH_JSON }}
      run: |
        echo "$AUTH_JSON_SECRET" > auth.json

    - name: Run Playwright Quiz Bot
      env:
        HEADLESS: "true"
      run: |
        python playwright_quiz_bot.py

    - name: Upload Diagnostic Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: diagnostic-screenshots
        path: mode_error_attempt_*.png
        if-no-files-found: ignore
